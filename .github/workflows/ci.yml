name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt bats

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Test
        run: make test
